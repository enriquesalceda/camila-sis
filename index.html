<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Super Camila Sis</title>
    <style>
      html, body {
        margin: 0; padding: 0; background: #000;
        width: 100%; height: 100%; overflow: hidden;
        overscroll-behavior: none; touch-action: none;
        -webkit-user-select: none; user-select: none;
        -webkit-tap-highlight-color: transparent;
        font-family: -apple-system, system-ui, sans-serif;
      }
      #game { display: block; width: 100vw; height: 100vh; }

      /* Touch overlay — only shown on touch devices (set by src/touch.js). */
      #touch { position: fixed; inset: 0; pointer-events: none; display: none; }
      #touch[data-touch="true"] { display: block; }
      .t-btn {
        position: absolute; width: 88px; height: 88px;
        border-radius: 50%; border: 3px solid rgba(255,255,255,0.7);
        background: rgba(0,0,0,0.35); color: #fff;
        font-size: 32px; line-height: 1; padding: 0;
        pointer-events: auto; touch-action: manipulation;
        -webkit-user-select: none; user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .t-btn:active { background: rgba(255,255,255,0.4); }
      .t-left  { left: 24px;  bottom: 24px; }
      .t-right { left: 132px; bottom: 24px; }
      .t-jump  { right: 24px; bottom: 24px; }
      .t-scoop { right: 132px; bottom: 24px; }
      .t-scoop[hidden] { display: none; }

      /* Rotate-to-landscape prompt — only shown on portrait phones/tablets. */
      #rotate-prompt {
        position: fixed; inset: 0; background: #000; color: #fff;
        display: none; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px; font-size: 24px; z-index: 1000;
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate-prompt { display: flex; }
      }
      #rotate-prompt .icon { font-size: 64px; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="touch">
      <button class="t-btn t-left"  data-key="left"  aria-label="Left">◀</button>
      <button class="t-btn t-right" data-key="right" aria-label="Right">▶</button>
      <button class="t-btn t-jump"  data-key="jump"  aria-label="Jump">⤴</button>
      <button class="t-btn t-scoop" data-key="scoop" aria-label="Throw ice cream" hidden>🍦</button>
    </div>

    <div id="rotate-prompt">
      <div class="icon">📱↻</div>
      <div>Rotate to landscape!</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
